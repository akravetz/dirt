; ESP32-C3 SuperMini fan-controller smoke test + (future) control loop.
; Drives the AC Infinity Cloudline LITE 6" fan via two 2N7000 MOSFETs on
; D+ (speed command) and B5 (keep-alive heartbeat). See
; wiki/hardware/ac-infinity-fan-control.md for the full wiring and protocol.
;
; Env: `fan` flashes over USB. Port override via --upload-port <path> if
; /dev/ttyACM4 is no longer the right device.

[platformio]
default_envs = fan

[esp32_c3_base]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D FIRMWARE_VERSION=\"0.0.1\"

[env:fan]
extends = esp32_c3_base
upload_port = /dev/ttyACM4
monitor_port = /dev/ttyACM4
