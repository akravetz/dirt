; ESP32-C3 SuperMini dual-role node: AC Infinity Cloudline LITE 6" fan
; driver + tent environmental sensor. Drives the fan via two 2N7000 MOSFETs
; on D+ (speed command) and B5 (keep-alive). Reads an Adafruit SHT45
; (product 5665) over I2C on GPIO 4/5 for tent temperature + humidity.
;
; See wiki/hardware/ac-infinity-fan-control.md and
; wiki/decisions/2026-04-22-sht45-tent-node-esp32.md.
;
; Env: `fan` flashes over USB. Port override via --upload-port <path> if
; /dev/ttyACM4 is no longer the right device.

[platformio]
default_envs = fan

[esp32_c3_base]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SHT4x Library@^1.0
    adafruit/Adafruit Unified Sensor@^1.1
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D FIRMWARE_VERSION=\"0.1.0\"

[env:fan]
extends = esp32_c3_base
upload_port = /dev/ttyACM4
monitor_port = /dev/ttyACM4
