; ESP32-C3 SuperMini environmental node. Reads an Adafruit SHT45 (product
; 5665) over I2C on GPIO 4/5 for tent temperature + humidity. The main
; `fan` env also drives an AC Infinity Cloudline LITE 6" fan via two 2N7000
; MOSFETs on D+ (speed command) and B5 (keep-alive), and exposes a LAN HTTP
; control surface on :80 (POST /fan, GET /fan).
;
; See wiki/hardware/ac-infinity-fan-control.md and
; wiki/decisions/2026-04-22-sht45-tent-node-esp32.md.
;
; Envs: `fan` / `breeding-env` flash over USB (/dev/ttyACM*), `fan-ota` /
; `breeding-env-ota` flash over WiFi after the initial flash.

[platformio]
default_envs = fan

[esp32_c3_base]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../common
lib_deps =
    adafruit/Adafruit SHT4x Library@^1.0
    adafruit/Adafruit Unified Sensor@^1.1
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D FIRMWARE_VERSION=\"0.2.1\"

[env:fan]
extends = esp32_c3_base
upload_port = /dev/ttyACM4
monitor_port = /dev/ttyACM4

[env:breeding-env]
extends = esp32_c3_base
upload_port = /dev/ttyACM1
monitor_port = /dev/ttyACM1
build_flags =
    ${esp32_c3_base.build_flags}
    -D FAN_CONTROL_ENABLED=0
    -D NODE_TENT_ID=\"breeding\"
    -D NODE_ZONE_ID=\"canopy\"
    -D NODE_DEVICE_ID=\"breeding-env-node\"
    -D NODE_HOSTNAME=\"breeding-env\"

[env:fan-ota]
extends = esp32_c3_base
upload_protocol = espota
upload_port = fan-controller.local
; PLANT_OTA_PASSWORD is shared across every dirt node — the name predates
; the tent/fan nodes and the OTA password is a single fleet-wide secret.
upload_flags =
    --auth=${sysenv.PLANT_OTA_PASSWORD}

[env:breeding-env-ota]
extends = esp32_c3_base
upload_protocol = espota
upload_port = breeding-env.local
build_flags =
    ${esp32_c3_base.build_flags}
    -D FAN_CONTROL_ENABLED=0
    -D NODE_TENT_ID=\"breeding\"
    -D NODE_ZONE_ID=\"canopy\"
    -D NODE_DEVICE_ID=\"breeding-env-node\"
    -D NODE_HOSTNAME=\"breeding-env\"
upload_flags =
    --auth=${sysenv.PLANT_OTA_PASSWORD}
