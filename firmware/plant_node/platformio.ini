; ESP32-C3 SuperMini plant-node firmware.
; Two envs per node: `plant-a` flashes over USB (/dev/ttyACM0), `plant-a-ota`
; flashes over WiFi (plant-a.local). Initial flash must be USB; after that,
; prefer OTA:  pio run -e plant-a-ota -t upload

[platformio]
default_envs = plant-a

[esp32_c3_base]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../common
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D FIRMWARE_VERSION=\"0.1.2\"

; --- plant A ---

[env:plant-a]
extends = esp32_c3_base
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
build_flags =
    ${esp32_c3_base.build_flags}
    -D PLANT_ID=\"a\"

[env:plant-a-ota]
extends = esp32_c3_base
upload_protocol = espota
upload_port = plant-a.local
upload_flags =
    --auth=${sysenv.PLANT_OTA_PASSWORD}
build_flags =
    ${esp32_c3_base.build_flags}
    -D PLANT_ID=\"a\"

; --- plant B ---
; Initial USB flash uses /dev/ttyACM2 (plant-a=ACM0, plant-d=ACM1 on this
; host). Override at CLI with --upload-port if enumeration differs.

[env:plant-b]
extends = esp32_c3_base
upload_port = /dev/ttyACM2
monitor_port = /dev/ttyACM2
build_flags =
    ${esp32_c3_base.build_flags}
    -D PLANT_ID=\"b\"

[env:plant-b-ota]
extends = esp32_c3_base
upload_protocol = espota
upload_port = plant-b.local
upload_flags =
    --auth=${sysenv.PLANT_OTA_PASSWORD}
build_flags =
    ${esp32_c3_base.build_flags}
    -D PLANT_ID=\"b\"

; --- plant C ---
; Initial USB flash uses /dev/ttyACM2 (plant-a=ACM0, plant-d=ACM1 on this
; host). Override at CLI with --upload-port if enumeration differs.

[env:plant-c]
extends = esp32_c3_base
upload_port = /dev/ttyACM2
monitor_port = /dev/ttyACM2
build_flags =
    ${esp32_c3_base.build_flags}
    -D PLANT_ID=\"c\"

[env:plant-c-ota]
extends = esp32_c3_base
upload_protocol = espota
upload_port = plant-c.local
upload_flags =
    --auth=${sysenv.PLANT_OTA_PASSWORD}
build_flags =
    ${esp32_c3_base.build_flags}
    -D PLANT_ID=\"c\"

; --- plant D ---
; Initial USB flash uses /dev/ttyACM1 (plant-a occupies ttyACM0 during
; development). Override at CLI with --upload-port if enumeration differs.

[env:plant-d]
extends = esp32_c3_base
upload_port = /dev/ttyACM1
monitor_port = /dev/ttyACM1
build_flags =
    ${esp32_c3_base.build_flags}
    -D PLANT_ID=\"d\"

[env:plant-d-ota]
extends = esp32_c3_base
upload_protocol = espota
upload_port = plant-d.local
upload_flags =
    --auth=${sysenv.PLANT_OTA_PASSWORD}
build_flags =
    ${esp32_c3_base.build_flags}
    -D PLANT_ID=\"d\"
