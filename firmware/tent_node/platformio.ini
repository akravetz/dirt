; ESP32-C3 SuperMini tent environmental sensor firmware.
; Reads an Adafruit SHT45 + PTFE cap (product 5665) over I2C and POSTs
; temperature_c + humidity_pct to the dirt ingest endpoint.
;
; Envs: `tent` flashes over USB (/dev/ttyACM0), `tent-ota` flashes over
; WiFi (tent-node.local). Initial flash must be USB; after that, prefer
; OTA:  pio run -e tent-ota -t upload

[platformio]
default_envs = tent

[esp32_c3_base]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../common
lib_deps =
    adafruit/Adafruit SHT4x Library@^1.0
    adafruit/Adafruit Unified Sensor@^1.1
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D FIRMWARE_VERSION=\"0.1.0\"

[env:tent]
extends = esp32_c3_base
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

[env:tent-ota]
extends = esp32_c3_base
upload_protocol = espota
upload_port = tent-node.local
; PLANT_OTA_PASSWORD is shared across every dirt node — the name predates
; the tent node and the OTA password is a single fleet-wide secret.
upload_flags =
    --auth=${sysenv.PLANT_OTA_PASSWORD}
