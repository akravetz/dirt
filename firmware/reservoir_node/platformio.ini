; ESP32-C3 SuperMini reservoir-node firmware.
;
; Reads a DFRobot KIT0139 hydrostatic pressure transducer through a
; SEN0262 4-20mA->0-5V converter via an ADS1115 16-bit I2C ADC, converts
; counts to depth_cm via compiled-in two-point calibration, and POSTs both
; the raw count and the converted depth to dirt-hwd's ingest endpoint
; every 30s. mDNS hostname dirt-reservoir.local; OTA on :3232.
;
; Wiring + signal-chain notes: wiki/hardware/reservoir-level.md.
;
; Two envs:
;   reservoir      USB flash, full WiFi + ingest + OTA. Use for initial flash.
;   reservoir-ota  OTA flash via dirt-reservoir.local. Use for in-place reflashes.

[platformio]
default_envs = reservoir

[esp32_c3_base]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../common
lib_deps =
    adafruit/Adafruit ADS1X15@^2.5.0
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D FIRMWARE_VERSION=\"0.1.2\"

[env:reservoir]
extends = esp32_c3_base
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

[env:reservoir-ota]
extends = esp32_c3_base
upload_protocol = espota
upload_port = dirt-reservoir.local
upload_flags =
    --auth=${sysenv.PLANT_OTA_PASSWORD}
