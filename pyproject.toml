[tool.uv.workspace]
members = ["apps/*", "contracts/python"]
exclude = ["apps/tests"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.3",
    "pytest-asyncio>=0.25",
    "httpx>=0.28",
    "ruff>=0.11",
    "pytestarch>=4.0.1",
    "pytest-playwright-asyncio>=0.7.2",
    "pytest-testmon>=2.2.0",
    "schemdraw>=0.22",
    "matplotlib>=3.10.8",
    "atlas-provider-sqlalchemy>=0.5.0",
    "import-linter>=2.11",
    "deptry>=0.25.1",
    "hypothesis>=6.152.1",
    "pre-commit>=4.5.1",
    "datamodel-code-generator>=0.56.1",
    "dirt-contracts",
    "kaggle>=2.1.0",
    "wandb>=0.26,<0.27",
    "boto3>=1.36",
]

[tool.uv.sources]
python-kasa = { git = "https://github.com/ZeliardM/python-kasa.git", rev = "feature/new-klap" }
dirt-shared = { workspace = true }
dirt-hwd = { workspace = true }
dirt-web = { workspace = true }
dirt-mcp = { workspace = true }
dirt-voice = { workspace = true }
dirt-control-plane = { workspace = true }
dirt-gateway = { workspace = true }
dirt-contracts = { workspace = true }

[tool.pytest.ini_options]
# Discovery roots: cross-cutting invariants at apps/tests/ plus per-app unit
# tests at apps/<name>/tests/. Each per-app pyproject also carries its own
# testpaths=["tests"] so `cd apps/hwd && uv run pytest` works in isolation.
testpaths = [
    "apps/tests",
    "apps/hwd/tests",
    "apps/web/tests",
    "apps/shared/tests",
    "apps/mcp/tests",
    "apps/voice/tests",
    "apps/control-plane/tests",
    "apps/gateway/tests",
    "apps/wake-word/tests",
]
asyncio_mode = "auto"
asyncio_default_test_loop_scope = "session"
markers = [
    "smoke: end-to-end pipeline tests on tiny data; opt in via `pytest -m smoke`",
]

[tool.ruff]
src = ["apps/hwd/src", "apps/web/src", "apps/shared/src", "apps/mcp/src", "apps/voice/src", "apps/wake-word/src", "apps/control-plane/src", "apps/gateway/src"]
line-length = 88
# Agent-owned surfaces only. .claude/ is harness / skill scaffolding
# shipped from upstream; scripts/ holds one-off maintenance tooling with
# its own style conventions (pragma allowed). Both would drown the
# signal-to-noise in ASYNC/T20/TID/RUF/S audits (PY-04/06/08) with
# pre-existing cosmetic drift agents aren't supposed to police.
# scripts/, kaggle kernel shim, and operator scripts in apps/wake-word/ have
# their own style conventions (print, subprocess, long lines, sed, etc.).
# The library at apps/wake-word/src/dirt_wake_word/ is normally linted.
extend-exclude = [
    "docs", ".claude", "scripts", "firmware", "debug",
    "apps/wake-word/docker",
    "apps/wake-word/data-gen",
    "apps/wake-word/validation",
    "apps/wake-word/reference",
]

[tool.ruff.lint]
# Rule-set rationale (kept next to the select):
#   E,F       — pycodestyle + pyflakes (line length, undefined names).
#   I         — isort (import ordering).
#   UP        — pyupgrade (modern Python idioms).
#   B         — flake8-bugbear (likely bugs).
#   SIM       — flake8-simplify (readability simplifications).
#   RUF       — Ruff-specific rules.
#   SLF       — flake8-self (private-member access).
#   ASYNC     — flake8-async (PY-04): flag blocking I/O inside `async def`
#               (time.sleep, open(), requests.get, subprocess.run, etc.).
#               Prevents the most common LLM correctness regression: a
#               synchronous call slipped into a FastAPI handler, which
#               blocks the event loop and produces mysterious tail-latency
#               under load.
#   T20       — flake8-print (PY-06): ban print() / pprint() in production.
#               Observability is structured (log_event, loguru); print
#               bypasses every log stream and breaks correlation-id chain.
#   TID       — flake8-tidy-imports (PY-08): ban relative imports at the
#               package boundary and redundant aliases.
#   S         — bandit security (PY-08): flag common security smells
#               (hardcoded passwords, shell=True, assert in prod, etc.).
#               S101 (assert in tests) exempted per-file below.
#   PLR0913/PLR0915 — function complexity ceilings (PY-08). Full PL
#               rule-set is noisy; only the two complexity rules are
#               worth it without triage.
select = [
    "E", "F", "I", "UP", "B", "SIM", "RUF", "SLF",
    "ASYNC", "T20", "TID", "S", "PLR0913", "PLR0915",
]
# ASYNC240 "don't use pathlib.Path in async fns; use trio.Path / anyio.Path"
# doesn't apply — Dirt uses stdlib asyncio exclusively.
# RUF001/RUF002/RUF003 complain about "ambiguous" unicode (× ≠ x,
# – ≠ -). Our docstrings and comments intentionally use typographic
# unicode; we don't care about the 'ambiguous' visual distinction.
# B008 is the standard FastAPI dependency-injection pattern
# (`param: T = Depends(get_T)`) — the rule is written for pre-FastAPI
# Python. Exempted per-file under [lint.per-file-ignores].
ignore = ["ASYNC240", "RUF001", "RUF002", "RUF003"]

[tool.ruff.lint.per-file-ignores]
# FastAPI uses `param: T = Depends(get_T)` idiomatically; B008 doesn't
# understand that.
"apps/*/src/**/api/*.py" = ["B008"]
"apps/*/src/dirt_hwd/api/*.py" = ["B008"]
"apps/*/src/dirt_web/api/*.py" = ["B008"]
"apps/*/src/dirt_mcp/**.py" = ["B008"]
# Test files and invariants prefer readability (long docstrings,
# structured-data tables, pytest parametrize lines) over a hard 88-char
# bound; SLF001 (private member access) is the entire point of a unit
# test that exercises an internal contract. Bandit S-rules aimed at
# production don't apply to tests: S101 assert is pytest's lingua
# franca; S105/S106 hardcoded "changeme" strings are test-fixture
# constants; S108 /tmp paths and S603/S607 subprocess-with-trusted-
# argv patterns show up in pytest + atlas / lint-imports / deptry
# wrappers with no security surface.
"apps/*/tests/**/*.py" = [
    "E501", "SLF001",
    "S101", "S105", "S106", "S108", "S603", "S607",
    "PLR0913", "PLR0915",
]
"apps/tests/**/*.py" = [
    "E501", "SLF001",
    "S101", "S105", "S106", "S108", "S603", "S607",
    "PLR0913", "PLR0915",
]
# Service wrappers around subprocess. Archive uses ssh / rsync on
# hardcoded paths; system_status shells ffprobe against a trusted
# snapshot path; dirt_shared.testing runs `atlas migrate apply`. All
# argvs are code-constant, no external input.
"apps/shared/src/dirt_shared/services/archive.py" = ["S603", "S607"]
"apps/shared/src/dirt_shared/services/system_status.py" = ["S603", "S607", "S108"]
"apps/shared/src/dirt_shared/services/capture.py" = ["S108"]
"apps/shared/src/dirt_shared/testing.py" = ["S603", "S607"]
"apps/hwd/src/dirt_hwd/services/archive.py" = ["S603", "S607"]
# Entry points bind uvicorn to 0.0.0.0 — the whole point is to accept
# LAN traffic; S104 is paranoid here.
"apps/hwd/src/dirt_hwd/main.py" = ["S104"]
"apps/web/src/dirt_web/main.py" = ["S104"]
# Config defaults include sentinel strings like "change-me-in-production"
# so non-voice deployments can boot without dashing through every
# secret.
"apps/shared/src/dirt_shared/config.py" = ["S105", "S106"]
# Wake-word library is operator-facing kernel-runtime code: print() calls
# are how operators see progress during a 90-min Kaggle run (no logging
# infrastructure attached); the timing.sh helper genuinely needs
# shell=True for piped commands; long log f-strings occasionally exceed
# 88 cols; multi-keyword-arg signatures + list-concat are deliberate.
"apps/wake-word/src/dirt_wake_word/*.py" = [
    "T201", "S602", "E501", "PLR0913", "RUF005",
]

[tool.ruff.format]
quote-style = "double"
