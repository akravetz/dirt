[tool.uv.workspace]
members = ["apps/*"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.3",
    "pytest-asyncio>=0.25",
    "httpx>=0.28",
    "ruff>=0.11",
    "pytestarch>=4.0.1",
    "pytest-playwright-asyncio>=0.7.2",
    "pytest-testmon>=2.2.0",
    "schemdraw>=0.22",
    "matplotlib>=3.10.8",
]

[tool.uv.sources]
python-kasa = { git = "https://github.com/ZeliardM/python-kasa.git", rev = "feature/new-klap" }
dirt-shared = { workspace = true }
dirt-hwd = { workspace = true }
dirt-web = { workspace = true }
dirt-mcp = { workspace = true }
dirt-voice = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_test_loop_scope = "session"

[tool.ruff]
src = ["apps/hwd/src", "apps/web/src", "apps/shared/src", "apps/mcp/src", "apps/voice/src"]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.ruff.format]
quote-style = "double"
