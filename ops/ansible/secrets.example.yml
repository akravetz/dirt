# Copy to ops/ansible/secrets.yml. The real file is gitignored.

dirt_wifi_interface: wlp3s0
dirt_wifi_ssid: "your-ssid"
dirt_wifi_psk: "your-wifi-password"

# Optional: copy a GitHub SSH key from this machine to the edge host so it can
# clone the private repo over SSH. Prefer a dedicated deploy key when possible.
dirt_github_ssh_private_key_src: "/home/akcom/.ssh/id_ed25519"
dirt_github_ssh_private_key_name: "github_dirt_ed25519"

# Optional: copy gh CLI auth from this machine. This grants the edge host the
# same GitHub token stored locally, so leave unset unless that host really needs
# `gh`.
dirt_gh_hosts_src: "/home/akcom/.config/gh/hosts.yml"
dirt_gh_config_src: "/home/akcom/.config/gh/config.yml"

# Optional: copy Codex CLI auth/config from this machine. The auth file is a
# credential; leave unset unless this edge host should be able to run Codex.
dirt_codex_auth_src: "/home/akcom/.codex/auth.json"
dirt_codex_config_src: "/home/akcom/.codex/config.toml"
