# Rotate dirt-camera-daemon logs.
#
# Triggered hourly by dirt-logrotate.timer (see
# systemd/dirt-logrotate.{service,timer}). Installed via scripts/install-systemd.
#
# Hourly trigger + maxsize 100M means a misbehaving client cannot fill the
# disk before the next rotation fires: the Apr 2026 incident saw the daemon's
# req/resp logging accumulate 411G in ~54h before the weekly cron would have
# run. The root fix is that req/resp are now DEBUG-level and suppressed by
# default; this remains defense-in-depth in case something regresses.
#
# NB: user-space logrotate cannot use system paths like /var/log.
# State file tracks last-rotated times per log.

/home/akcom/.local/state/dirt/camera.log {
    hourly
    maxsize 100M
    rotate 48
    compress
    delaycompress
    missingok
    notifempty
    create 0644 akcom akcom
    # The daemon opens the log with O_APPEND, so a plain rotate (rename+recreate)
    # would leave the daemon writing to the rotated-away file. Use copytruncate
    # to atomically truncate the active log instead; the daemon's existing fd
    # keeps working.
    copytruncate
}
