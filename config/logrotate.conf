# Rotate dirt-camera-daemon logs.
#
# Install:
#   mkdir -p ~/.local/state/dirt
#   # Add to user crontab (crontab -e):
#   #   0 3 * * 0  /usr/sbin/logrotate -s $HOME/.local/state/dirt/logrotate.status $HOME/code/dirt/config/logrotate.conf
# This rotates weekly (Sundays at 03:00), compresses after the first rotation,
# and keeps 4 weeks of history.

# NB: user-space logrotate cannot use system paths like /var/log.
# State file tracks last-rotated times per log.

/home/akcom/.local/state/dirt/camera.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0644 akcom akcom
    # The daemon opens the log with O_APPEND, so a plain rotate (rename+recreate)
    # would leave the daemon writing to the rotated-away file. Use copytruncate
    # to atomically truncate the active log instead; the daemon's existing fd
    # keeps working.
    copytruncate
}
