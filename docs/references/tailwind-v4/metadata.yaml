claude_md_pointer:
  path: docs/references/tailwind-v4/INDEX.md
  consult_when: >-
    Consult when writing or refactoring Tailwind utility classes in
    `web-ui/src/`, editing `web-ui/src/styles.css` (global
    `@import "tailwindcss"` + `@theme` directive), wiring `vite.config.ts` for
    the `@tailwindcss/vite` plugin, porting the Dirt paper/ink/magenta palette
    and Fraunces / IBM Plex Mono / Inter fonts from
    `debug/webapp.zip/colors_and_type.css`, adding custom utilities with
    `@utility`, or overriding dark mode with `@custom-variant`. Tailwind v4 is
    a ground-up rewrite — training data reliably suggests v3 patterns
    (`tailwind.config.js` with `content:` / `theme.extend`, the three
    `@tailwind base/components/utilities` directives, `postcss-cli` +
    `autoprefixer` boilerplate, PurgeCSS), all obsolete in v4.
