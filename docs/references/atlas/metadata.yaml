  consult_when: >-
    Consult when writing or modifying Atlas HCL schema files, editing
    `atlas.hcl` config, running `atlas migrate diff` / `atlas migrate apply`
    / `atlas migrate lint`, configuring the SQLAlchemy external schema loader
    to derive HCL from SQLModel models in
    `apps/shared/src/dirt_shared/models/`, or authoring migration files
    under `migrations/`. Anchors to current Atlas v1.2 practice and
    overrides training-data instincts toward Alembic or hand-written SQL
    migrations.
