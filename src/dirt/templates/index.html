<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt — Live Feed</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        h1 { margin-bottom: 1rem; font-size: 1.5rem; }
        .feed-container {
            max-width: 960px;
            width: 100%;
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
        }
        .feed-container img {
            width: 100%;
            display: block;
        }
        .feed-status {
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid #333;
        }
        .no-feed {
            padding: 4rem 2rem;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Dirt</h1>
    <div class="feed-container">
        <div hx-get="/feed/image" hx-trigger="load, every 5s" hx-swap="innerHTML">
            <div class="no-feed">Waiting for first snapshot...</div>
        </div>
        <div class="feed-status"
             hx-get="/feed/status"
             hx-trigger="load, every 5s"
             hx-swap="innerHTML">
        </div>
    </div>
</body>
</html>
