; INVARIANT CONFIG — HUMAN-OWNED
;
; This file is protected by Codex hooks and MUST NOT be modified by
; the agent. It encodes architectural import boundaries enforced by
; import-linter.
;
; Invoked from apps/tests/invariants/test_import_boundaries.py via
; `lint-imports --config <this file>`. If the wrapper test fails, the
; agent must fix code to satisfy the contracts here — never modify this
; file or the test wrapper.
;
; ---------------------------------------------------------------------------

[importlinter]
root_packages =
    dirt_shared
    dirt_hwd
    dirt_web
    dirt_mcp
    dirt_voice
include_external_packages = False

; ===========================================================================
; Cross-app boundaries
;
; Five workspace packages: dirt_shared is the pure base; dirt_hwd owns
; hardware; dirt_web is UI + API; dirt_mcp mounts into dirt_web; dirt_voice
; runs in its own process. Apps share state ONLY through the database
; (dirt_shared.models / .services) or HTTP across process boundaries —
; never by direct Python import of a peer app.
; ===========================================================================

[importlinter:contract:dirt_shared-stays-pure]
name = dirt_shared must not depend on any peer app
type = forbidden
source_modules = dirt_shared
forbidden_modules =
    dirt_hwd
    dirt_web
    dirt_mcp
    dirt_voice

[importlinter:contract:dirt_hwd-isolation]
name = dirt_hwd must not import dirt_web / dirt_mcp / dirt_voice
type = forbidden
source_modules = dirt_hwd
forbidden_modules =
    dirt_web
    dirt_mcp
    dirt_voice

[importlinter:contract:dirt_web-isolation]
name = dirt_web must not import dirt_hwd or dirt_voice (mcp is allowed — mounted sub-app)
type = forbidden
source_modules = dirt_web
forbidden_modules =
    dirt_hwd
    dirt_voice

[importlinter:contract:dirt_mcp-isolation]
name = dirt_mcp must not import dirt_hwd / dirt_web / dirt_voice
type = forbidden
source_modules = dirt_mcp
forbidden_modules =
    dirt_hwd
    dirt_web
    dirt_voice

[importlinter:contract:dirt_voice-isolation]
name = dirt_voice must not import dirt_hwd / dirt_web / dirt_mcp
type = forbidden
source_modules = dirt_voice
forbidden_modules =
    dirt_hwd
    dirt_web
    dirt_mcp

; ===========================================================================
; API layer must not reach past services into db / models
;
; api/* modules are HTTP edge — they translate requests to service calls
; and back. They must NOT import dirt_shared.db (session management) or
; dirt_shared.models (SQLModel definitions) directly, because that would
; let route handlers open ad-hoc sessions and bypass the service layer's
; invariants (auth checks, transaction shape, ingest validation).
; ===========================================================================

[importlinter:contract:hwd-api-stays-above-db]
name = dirt_hwd.api may not import dirt_shared.db or .models
type = forbidden
source_modules = dirt_hwd.api
forbidden_modules =
    dirt_shared.db
    dirt_shared.models
; Services legitimately import models — only flag direct api → db / models.
allow_indirect_imports = True

[importlinter:contract:web-api-stays-above-db]
name = dirt_web.api may not import dirt_shared.db or .models
type = forbidden
source_modules = dirt_web.api
forbidden_modules =
    dirt_shared.db
    dirt_shared.models
allow_indirect_imports = True

; ===========================================================================
; Layered contract for dirt_shared internals
;
; dirt_shared has a conventional layered structure: dirt_shared.services
; sits on top (business logic), db + models hold the ORM surface, and
; config + observability are leaf utilities. A layered contract forbids
; lower-layer modules from reaching up into higher ones — prevents
; models from importing dirt_shared.services (which would invert the
; dep graph and create import cycles under load) and keeps config /
; observability as pure leaves any layer may import.
;
; Layer order (top → bottom; higher layers may import lower, never the
; reverse):
;   services → db → models → {config, observability}
;
; db sits above models because dirt_shared.db imports dirt_shared.models
; as a registration side-effect (populates SQLModel.metadata). config
; and observability are siblings at the bottom — neither imports from
; dirt_shared. Non-layered siblings (app_wiring.py, testing.py,
; __init__.py) are intentionally outside this contract — app_wiring is
; the composition root inside the package and imports from services by
; design.
; ===========================================================================

[importlinter:contract:dirt_shared-layered-internals]
name = dirt_shared internal layers: services > db > models > {config, observability}
type = layers
containers =
    dirt_shared
layers =
    services
    db
    models
    config | observability
